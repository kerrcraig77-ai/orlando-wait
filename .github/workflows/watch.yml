name: Disney wait watcher

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: disney-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run watcher
        run: python check_waits.py

      - name: Persist alert state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "disney-watcher"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "Update alert state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
