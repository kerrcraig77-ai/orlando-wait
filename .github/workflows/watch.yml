name: Disney wait watcher

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "30 16 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: disney-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Watch (60s poll for ~5.5 hours)
        run: |
          END=$((SECONDS + 19800))
          while [ $SECONDS -lt $END ]; do
            python check_waits.py || true
            if [[ -n "$(git status --porcelain state.json)" ]]; then
              git config user.name "disney-watcher"
              git config user.email "actions@users.noreply.github.com"
              git add state.json
              git commit -m "Update alert state [skip ci]" >/dev/null 2>&1 || true
              git pull --rebase >/dev/null 2>&1 || true
              git push >/dev/null 2>&1 || true
            fi
            [ $SECONDS -lt $END ] && sleep 55
          done
